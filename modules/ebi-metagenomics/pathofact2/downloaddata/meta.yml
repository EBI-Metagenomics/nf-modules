# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "pathofact2_downloaddata"
description: Module to download and decompress Pathofact2 models
keywords:
  - pathofact2
  - models
  - wget
tools:
  - wget:
      description: "wget is a free utility for non-interactive download of files from
        the Web."
      homepage: "https://www.gnu.org/software/wget/"
      documentation: "https://www.gnu.org/software/wget/manual/wget.html"
      licence: ["GPL"]
      identifier: ""
  - untar:
      description: |
        Extract tar, tar.gz, tar.bz2, tar.xz files.
      documentation: https://www.gnu.org/software/tar/manual/
      licence: ["GPL-3.0-or-later"]
      identifier: ""
# No input required for download module
output:
  - db:
      - pathofact_db/Models/:
          type: directory
          description: Directory containing the Pathofact2 models
          pattern: "pathofact_db/Models/"
  - versions:
      - versions_yml:
          type: file
          description: File containing software versions
          pattern: "versions.yml"
authors:
  - "@lfdelzam"
  - "@Ales-ibt"
